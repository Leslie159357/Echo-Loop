name: Build iOS
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {channel: master, cache: true}
      - run: cp .dev.env.template .dev.env
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - run: mkdir -p Payload && cp -r build/ios/iphoneos/Runner.app Payload/ && zip -r EchoLoop.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: EchoLoop.ipa
          path: EchoLoop.ipa
          retention-days: 7
